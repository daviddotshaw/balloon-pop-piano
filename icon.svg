<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a50"/>
      <stop offset="100%" stop-color="#060318"/>
    </radialGradient>
    <radialGradient id="rb" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ff7a72"/>
      <stop offset="100%" stop-color="#c0150a"/>
    </radialGradient>
    <radialGradient id="bb" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#5ac8ff"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </radialGradient>
    <radialGradient id="yb" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffe97a"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </radialGradient>
    <radialGradient id="pb" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#d98aff"/>
      <stop offset="100%" stop-color="#7b0fc0"/>
    </radialGradient>
    <radialGradient id="gb" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#7affa0"/>
      <stop offset="100%" stop-color="#0a9940"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="60"  cy="55"  r="3"   fill="white" opacity="0.8"/>
  <circle cx="110" cy="35"  r="1.8" fill="white" opacity="0.6"/>
  <circle cx="420" cy="48"  r="2.5" fill="white" opacity="0.7"/>
  <circle cx="460" cy="90"  r="1.5" fill="white" opacity="0.5"/>
  <circle cx="390" cy="28"  r="2"   fill="white" opacity="0.6"/>
  <circle cx="480" cy="200" r="1.8" fill="white" opacity="0.5"/>
  <circle cx="30"  cy="180" r="2"   fill="white" opacity="0.6"/>
  <circle cx="85"  cy="420" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="440" cy="380" r="2"   fill="white" opacity="0.5"/>
  <circle cx="330" cy="460" r="2"   fill="white" opacity="0.4"/>

  <!-- Green balloon (back-left) -->
  <g transform="translate(108,315)">
    <ellipse cx="0" cy="0" rx="52" ry="64" fill="url(#gb)"/>
    <ellipse cx="-16" cy="-20" rx="12" ry="20" fill="rgba(255,255,255,0.35)" transform="rotate(-15,-16,-20)"/>
    <circle cx="0" cy="66" r="7" fill="#076b2c"/>
    <line x1="0" y1="73" x2="-8" y2="170" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="10" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="44" fill="#1a1a1a">F</text>
  </g>

  <!-- Purple balloon (back-right) -->
  <g transform="translate(400,295)">
    <ellipse cx="0" cy="0" rx="52" ry="64" fill="url(#pb)"/>
    <ellipse cx="-16" cy="-20" rx="12" ry="20" fill="rgba(255,255,255,0.35)" transform="rotate(-15,-16,-20)"/>
    <circle cx="0" cy="66" r="7" fill="#520a80"/>
    <line x1="0" y1="73" x2="10" y2="168" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="10" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="44" fill="#fff">A</text>
  </g>

  <!-- Blue balloon (mid-left) -->
  <g transform="translate(152,210)">
    <ellipse cx="0" cy="0" rx="60" ry="74" fill="url(#bb)"/>
    <ellipse cx="-18" cy="-23" rx="14" ry="23" fill="rgba(255,255,255,0.38)" transform="rotate(-15,-18,-23)"/>
    <circle cx="0" cy="76" r="8" fill="#00339e"/>
    <line x1="0" y1="84" x2="-12" y2="200" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="10" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="52" fill="#fff">G</text>
  </g>

  <!-- Red balloon (front centre, large) -->
  <g transform="translate(256,182)">
    <ellipse cx="0" cy="0" rx="78" ry="95" fill="url(#rb)"/>
    <ellipse cx="-24" cy="-30" rx="18" ry="30" fill="rgba(255,255,255,0.40)" transform="rotate(-15,-24,-30)"/>
    <circle cx="0" cy="97" r="10" fill="#8a0a05"/>
    <path d="M0,107 Q-18,148 -4,205 Q6,238 12,278" stroke="rgba(255,255,255,0.45)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="0" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="68" fill="#fff">C</text>
  </g>

  <!-- Yellow balloon (mid-right) -->
  <g transform="translate(365,208)">
    <ellipse cx="0" cy="0" rx="58" ry="72" fill="url(#yb)"/>
    <ellipse cx="-18" cy="-22" rx="13" ry="22" fill="rgba(255,255,255,0.38)" transform="rotate(-15,-18,-22)"/>
    <circle cx="0" cy="74" r="8" fill="#996600"/>
    <line x1="0" y1="82" x2="14" y2="195" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="10" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="50" fill="#1a1a1a">E</text>
  </g>

  <!-- Music note -->
  <text x="256" y="470" text-anchor="middle" font-size="36" fill="rgba(255,255,200,0.55)">🎵</text>
</svg>
